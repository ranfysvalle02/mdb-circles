<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>myCircle ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --primary-color: #00dcff;
      --secondary-color: #a27bff;
      --primary-glow: rgba(0, 220, 255, 0.5);
      --secondary-glow: rgba(162, 123, 255, 0.5);
      --border-color: rgba(162, 123, 255, 0.3);
      --background-color: #0a041f;
      --card-background: rgba(26, 19, 52, 0.4);
      --text-color: #e0e0e0;
      --text-muted-color: #a0a0b0;
      --timeline-color: rgba(162, 123, 255, 0.4);
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes move-twink-back { from { background-position: 0 0; } to { background-position: -10000px 5000px; } }
    body { font-family: 'Exo 2', sans-serif; color: var(--text-color); background-color: var(--background-color); min-height: 100vh; margin: 0; padding-top: 1rem; padding-bottom: 1rem; overflow-x: hidden; }
    .stars, .twinkling { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; display: block; z-index: -2; }
    .stars { background: #000 url(https://www.script-tutorials.com/demos/360/images/stars.png) repeat top center; }
    .twinkling { background: transparent url(https://www.script-tutorials.com/demos/360/images/twinkling.png) repeat top center; animation: move-twink-back 200s linear infinite; }
    .container { max-width: 1100px; }
    h1, h2, h3, h4, h5 { font-family: 'Orbitron', sans-serif; color: #fff; }
    h1 { text-shadow: 0 0 15px var(--primary-glow); }
    h3, h4 { border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1rem; }
    .glass-card { background: var(--card-background); border-radius: 15px; padding: 25px; border: 1px solid var(--border-color); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 32px 0 rgba(10, 4, 31, 0.37); margin-bottom: 25px; animation: fadeIn 0.6s ease-out forwards; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .glass-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px 0 rgba(10, 4, 31, 0.5); }
    @media (min-width: 992px) {
        #sidebar { position: sticky; top: 1.5rem; height: calc(100vh - 3rem); overflow-y: auto; }
        #sidebar::-webkit-scrollbar { width: 5px; }
        #sidebar::-webkit-scrollbar-track { background: transparent; }
        #sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    }
    .feed-timeline { border-left: 2px solid var(--timeline-color); padding-left: 25px; }
    .post-card-wrapper { position: relative; }
    .post-card-wrapper::before {
        content: '';
        position: absolute;
        left: -35px;
        top: 25px;
        height: 18px;
        width: 18px;
        background-color: var(--secondary-glow);
        border: 3px solid var(--text-color);
        border-radius: 50%;
        z-index: 1;
    }
    .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border-color); background-color: rgba(255,255,255,0.1); }
    .avatar-lg { width: 60px; height: 60px; }
    .avatar-sm { width: 30px; height: 30px; }
    .btn { font-family: 'Orbitron', sans-serif; font-weight: 600; border-radius: 8px; border: none; padding: 10px 15px; transition: all 0.3s ease; background-size: 200% 100%; color: white; letter-spacing: 1px; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-primary { background-image: linear-gradient(to right, #6a11cb 0%, #2575fc 51%, #6a11cb 100%); }
    .btn-success { background-image: linear-gradient(to right, #11cb6a 0%, #259cfc 51%, #11cb6a 100%); }
    .btn-secondary { background-image: linear-gradient(to right, #434343 0%, #000000 51%, #434343 100%); }
    .btn-danger { background-image: linear-gradient(to right, #cb1111 0%, #fc2575 51%, #cb1111 100%); }
    .btn:hover { background-position: right center; transform: translateY(-2px) scale(1.05); box-shadow: 0 0 15px var(--secondary-glow); color: #fff; }
    .form-control, .form-select { background-color: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color); color: #fff; border-radius: 8px; }
    .form-control::placeholder { color: #aaa; }
    .form-control:focus, .form-select:focus { background-color: rgba(0, 0, 0, 0.4); color: #fff; box-shadow: 0 0 10px var(--secondary-glow); border-color: #a27bff; }
    .list-group-item { background-color: transparent; border-color: var(--border-color); color: var(--text-color); }
    .list-group-item.clickable { cursor: pointer; transition: background-color 0.2s ease, transform 0.2s ease; }
    .list-group-item.clickable:hover, .list-group-item.active { background-color: rgba(255,255,255,0.1); transform: translateX(5px); }
    .modal-content { background: rgba(16, 8, 47, 0.8); border-radius: 15px; border: 1px solid var(--border-color); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
    .modal-header, .modal-footer { border-color: var(--border-color); }
    .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }
    .hidden { display: none !important; }
    #globalStatus { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1056; }
    .empty-placeholder { color: var(--text-muted-color); text-align: center; padding: 2rem; }
    .post-card .badge { text-transform: capitalize; }
    .post-card .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; border-radius: 8px; }
    .post-card .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #feed-loader { text-align: center; padding: 1.5rem; }
    /* ## --- CHANGE START --- ## */
    .vote-controls { display: flex; flex-direction: column; align-items: center; justify-content: start; gap: 0.2rem; margin-right: 15px; }
    .vote-btn { background: none; border: none; color: var(--text-muted-color); cursor: pointer; padding: 0.2rem 0.5rem; font-size: 1.5rem; transition: color 0.2s, transform 0.2s; }
    .vote-btn:hover { color: #fff; transform: scale(1.1); }
    .vote-btn.up.voted { color: var(--primary-color); text-shadow: 0 0 8px var(--primary-glow); }
    .vote-btn.down.voted { color: var(--secondary-color); text-shadow: 0 0 8px var(--secondary-glow); }
    .vote-score { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: bold; color: #fff; }
    .post-card-body { flex: 1; }
    /* ## --- CHANGE END --- ## */
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="twinkling"></div>

  <div class="container">
    <h1 class="text-center my-4">myCircle ✨</h1>

    <div id="authSection" class="glass-card text-center hidden">
      <h2>Welcome</h2>
      <p class="text-muted">Please log in or register to connect with others.</p>
      <button id="loginButton" class="btn btn-primary"><i class="bi bi-box-arrow-in-right"></i> Login / Register</button>
    </div>

    <div id="appSection" class="hidden">
      <div id="appHeader" class="glass-card d-flex justify-content-between align-items-center mb-4">
        <h2 id="welcomeMessage" class="mb-0 fs-4"></h2>
        <div id="userActions">
            <button id="createPostBtn" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> New Post</button>
            <button id="createCircleBtn" class="btn btn-success btn-sm"><i class="bi bi-plus-circle"></i> New Circle</button>
            <button id="logoutButton" class="btn btn-secondary btn-sm"><i class="bi bi-box-arrow-left"></i> Logout</button>
        </div>
      </div>

      <div id="dashboardView" class="hidden">
        <div class="row">
          <div class="col-12 col-lg-4">
              <div id="sidebar">
                  <div class="glass-card">
                    <h3><i class="bi bi-person-circle"></i> My Profile</h3>
                    <div id="profileContainer"></div>
                  </div>
                  <div class="glass-card">
                      <h3><i class="bi bi-grid-3x3-gap"></i> My Circles</h3>
                      <p class="text-muted small">Click a circle to filter your feed.</p>
                      <div id="myCirclesContainer" class="list-group"></div>
                  </div>
                  <div class="glass-card">
                      <h3><i class="bi bi-person-check"></i> Following</h3>
                      <div id="followingContainer" class="list-group list-group-flush" style="max-height: 250px; overflow-y: auto;"></div>
                  </div>
                  <div class="glass-card">
                      <h3><i class="bi bi-people"></i> Find Users</h3>
                      <h5 class="text-primary fs-6">Suggestions from Your Circles</h5>
                      <div id="userSuggestionsContainer" class="list-group list-group-flush mb-3"></div>
                      <h5 class="text-primary fs-6 pt-3" style="border-top: 1px solid var(--border-color);">Search for a User</h5>
                      <div class="input-group">
                        <input type="text" id="userSearchInput" class="form-control" placeholder="Enter username...">
                        <button id="userSearchBtn" class="btn btn-primary"><i class="bi bi-search"></i></button>
                      </div>
                      <div id="usersContainer" class="list-group list-group-flush mt-3"></div>
                  </div>
                  </div>
          </div>
          <div class="col-12 col-lg-8">
            <div id="feedContainer" class="feed-timeline"></div>
          </div>
        </div>
      </div>
      
      <div id="circleView" class="hidden">
        <div id="circleHeader" class="glass-card"></div>
        <div id="circleFeedContainer" class="feed-timeline"></div>
      </div>
    </div>

    <div id="feed-loader" class="hidden">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
  </div>
  
  <div id="globalStatus"></div>

  <div class="modal fade" id="authModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Login or Register</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="text" id="usernameInput" class="form-control mb-3" placeholder="Username (e.g., alice)"><input type="password" id="passwordInput" class="form-control" placeholder="Password (e.g., password123)"></div><div class="modal-footer"><button id="loginModalButton" class="btn btn-primary">Login</button><button id="registerModalButton" class="btn btn-success">Register</button></div></div></div></div>
  <div class="modal fade" id="createCircleModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Create New Circle</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="createCircleForm"><div class="mb-3"><input type="text" id="circleName" class="form-control" placeholder="Circle Name" required></div><div class="mb-3"><textarea id="circleDescription" class="form-control" placeholder="Description (Optional)"></textarea></div><div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" role="switch" id="isPublicSwitch" checked><label class="form-check-label" for="isPublicSwitch">Public Circle</label></div></form></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button id="submitCircleButton" type="button" class="btn btn-success"><i class="bi bi-check-lg"></i> Create Circle</button></div></div></div></div>
  <div class="modal fade" id="createPostModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Create New Post</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="createPostForm"><div class="mb-3"><label for="circleSelect" class="form-label">Share to Circle</label><select id="circleSelect" class="form-select"></select></div><div class="mb-3"><label for="postTypeSelect" class="form-label">Post Type</label><select id="postTypeSelect" class="form-select"><option value="text_update">Text Update</option><option value="wishlist_item">Wishlist Item</option><option value="youtube_video">YouTube Video</option></select></div><div id="postContentFields"></div></form></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button id="submitPostButton" type="button" class="btn btn-primary"><i class="bi bi-send"></i> Submit Post</button></div></div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const BASE_URL = ''; 

    const state = {
        accessToken: localStorage.getItem('accessToken') || null,
        refreshToken: localStorage.getItem('refreshToken') || null,
        currentUser: null,
        myCircles: [],
        dashboardFeed: { filter: { circle_id: null }, skip: 0, limit: 10, hasMore: true, isLoading: false },
        circleView: { currentCircle: null, skip: 0, limit: 10, hasMore: true, isLoading: false }
    };

    const dom = {
        authSection: document.getElementById('authSection'),
        appSection: document.getElementById('appSection'),
        dashboardView: document.getElementById('dashboardView'),
        circleView: document.getElementById('circleView'),
        welcomeMessage: document.getElementById('welcomeMessage'),
        userActions: document.getElementById('userActions'),
        profileContainer: document.getElementById('profileContainer'),
        usersContainer: document.getElementById('usersContainer'),
        userSuggestionsContainer: document.getElementById('userSuggestionsContainer'),
        followingContainer: document.getElementById('followingContainer'),
        myCirclesContainer: document.getElementById('myCirclesContainer'),
        feedContainer: document.getElementById('feedContainer'),
        circleHeader: document.getElementById('circleHeader'),
        circleFeedContainer: document.getElementById('circleFeedContainer'),
        feedLoader: document.getElementById('feed-loader'),
        postTypeSelect: document.getElementById('postTypeSelect'),
        postContentFields: document.getElementById('postContentFields'),
    };
    
    const setButtonLoading = (btn, isLoading) => { if(btn) { btn.disabled = isLoading; if(isLoading) { btn.dataset.html = btn.innerHTML; btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span>`; } else { btn.innerHTML = btn.dataset.html; } } };
    const showStatus = (msg, type = 'success') => { const id = `a${Date.now()}`; document.getElementById('globalStatus').innerHTML = `<div id="${id}" class="alert alert-${type} alert-dismissible fade show"> ${msg} <button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`; setTimeout(() => bootstrap.Alert.getOrCreateInstance(`#${id}`)?.close(), 4000); };
    const getYouTubeID = url => { const arr = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/); return (arr && arr[1]) ? arr[1] : null; };

    let isRefreshing = false;
    let failedQueue = [];
    const processQueue = (error, token = null) => { failedQueue.forEach(prom => { if (error) { prom.reject(error); } else { prom.resolve(token); } }); failedQueue = []; };

    async function apiFetch(endpoint, options = {}) {
        const customOptions = { ...options, headers: { ...options.headers, 'Content-Type': 'application/json' } };
        if (state.accessToken) { customOptions.headers['Authorization'] = `Bearer ${state.accessToken}`; }
        let response = await fetch(`${BASE_URL}${endpoint}`, customOptions);
        if (response.status === 401 && state.refreshToken) {
            if (isRefreshing) {
                return new Promise((resolve, reject) => { failedQueue.push({ resolve, reject }); }).then(() => { customOptions.headers['Authorization'] = `Bearer ${state.accessToken}`; return fetch(`${BASE_URL}${endpoint}`, customOptions); });
            }
            isRefreshing = true;
            try {
                const refreshResponse = await fetch(`${BASE_URL}/auth/refresh`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh_token: state.refreshToken }), });
                if (!refreshResponse.ok) throw new Error("Refresh failed");
                const tokenData = await refreshResponse.json();
                storeTokens(tokenData.access_token, tokenData.refresh_token);
                processQueue(null, tokenData.access_token);
                customOptions.headers['Authorization'] = `Bearer ${state.accessToken}`;
                response = await fetch(`${BASE_URL}${endpoint}`, customOptions);
            } catch (err) { processQueue(err, null); logout(); return Promise.reject(err); } finally { isRefreshing = false; }
        }
        if (!response.ok) {
            const err = await response.json().catch(() => ({ detail: `Error: ${response.status}` }));
            showStatus(err.detail || 'An unknown error occurred.', 'danger');
            throw new Error(err.detail);
        }
        return response.status === 204 ? null : response.json();
    }

    const storeTokens = (access, refresh) => { state.accessToken = access; state.refreshToken = refresh; localStorage.setItem('accessToken', access); localStorage.setItem('refreshToken', refresh); };
    const logout = () => { state.accessToken = null; state.refreshToken = null; state.currentUser = null; localStorage.clear(); window.location.hash = ''; handleRoute(); };
    const login = async (username, password) => { const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) }); storeTokens(data.access_token, data.refresh_token); await fetchCurrentUser(); handleRoute(); showStatus('Login successful!', 'success'); return true; };
    const register = async (username, password) => { await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ username, password }) }); showStatus('Registration successful! Please log in.', 'success'); return true; };
    async function fetchCurrentUser() { if (!state.accessToken) return; try { state.currentUser = await apiFetch('/users/me'); } catch (error) { console.error("Token might be expired or invalid, logging out.", error); logout(); } }

    async function handleRoute() {
        await fetchCurrentUser();
        const hash = window.location.hash;
        const circleRouteMatch = hash.match(/^#\/circle\/(.+)$/);
        if (circleRouteMatch) { await showCircleView(circleRouteMatch[1]); } else { await showDashboardView(); }
    }

    async function showDashboardView() {
        dom.circleView.classList.add('hidden');
        if (state.currentUser) {
            dom.authSection.classList.add('hidden');
            dom.appSection.classList.remove('hidden');
            dom.dashboardView.classList.remove('hidden');
            dom.welcomeMessage.textContent = `Welcome, ${state.currentUser.username}!`;
            dom.userActions.classList.remove('hidden');
            renderDashboard();
        } else {
            dom.appSection.classList.add('hidden');
            dom.authSection.classList.remove('hidden');
        }
    }

    async function showCircleView(circleId) {
        state.circleView.currentCircle = { _id: circleId };
        dom.authSection.classList.add('hidden');
        dom.dashboardView.classList.add('hidden');
        dom.appSection.classList.remove('hidden');
        dom.circleView.classList.remove('hidden');
        dom.welcomeMessage.textContent = `Viewing a Circle`;
        dom.userActions.classList.toggle('hidden', !state.currentUser);
        resetAndRenderCircleFeed();
    }

    async function renderDashboard() {
        renderProfile();
        renderFollowingList();
        renderUserSuggestions();
        dom.usersContainer.innerHTML = '<p class="text-muted small text-center">Or search by exact username.</p>';
        try {
            const myCircles = await apiFetch('/circles/mine');
            state.myCircles = myCircles;
            renderMyCircles(myCircles);
            resetAndRenderDashboardFeed();
        } catch (error) { console.error("Failed to load dashboard data", error); }
    }
    
    function renderProfile() { if (!state.currentUser) return; dom.profileContainer.innerHTML = `<div class="d-flex align-items-center"><div class="avatar avatar-lg me-3 d-flex align-items-center justify-content-center fs-2"><i class="bi bi-person-circle"></i></div><div><h4 class="mb-0">${state.currentUser.username}</h4><p class="mb-1"><strong>Following:</strong> ${state.currentUser.following_count}</p><p class="mb-0"><strong>Followers:</strong> ${state.currentUser.followers_count}</p></div></div>`; }
    function renderUserList(users, container, emptyMessage) { if (!users || users.length === 0) { container.innerHTML = `<p class="text-muted small text-center">${emptyMessage}</p>`; return; } const followingIds = state.currentUser ? state.currentUser.following.map(u => u._id) : []; container.innerHTML = users.map(user => { if (state.currentUser && user.username === state.currentUser.username) return ''; const isFollowing = followingIds.includes(user._id); return `<div class="list-group-item d-flex justify-content-between align-items-center"><div class="d-flex align-items-center"><div class="avatar avatar-sm me-2 d-flex align-items-center justify-content-center"><i class="bi bi-person-circle"></i></div><span>${user.username}</span></div><button class="btn btn-sm ${isFollowing ? 'btn-danger' : 'btn-primary'}" data-action="toggle-follow" data-username="${user.username}">${isFollowing ? 'Unfollow' : 'Follow'}</button></div>`; }).join(''); }
    function renderFollowingList() { if (!state.currentUser) return; renderUserList(state.currentUser.following, dom.followingContainer, "You aren't following anyone yet."); }
    
    async function renderUserSuggestions() {
        if (!state.currentUser) return;
        try {
            const suggestions = await apiFetch('/users/suggestions');
            renderUserList(suggestions, dom.userSuggestionsContainer, "No new suggestions from your circles.");
        } catch (error) {
            console.error("Failed to load user suggestions", error);
            dom.userSuggestionsContainer.innerHTML = '<p class="text-danger small text-center">Could not load suggestions.</p>';
        }
    }

    function renderMyCircles(circles) {
        const { circle_id } = state.dashboardFeed.filter;
        let html = `<a href="#" class="list-group-item clickable list-group-item-action ${!circle_id ? 'active' : ''}" data-action="filter-feed" data-circle-id=""><i class="bi bi-collection-fill me-2"></i>All My Circles</a>`;
        html += circles.map(c => `<div class="list-group-item d-flex justify-content-between align-items-center p-0"><a href="#" class="flex-grow-1 text-decoration-none text-white clickable list-group-item-action border-0 ${circle_id === c._id ? 'active' : ''}" data-action="filter-feed" data-circle-id="${c._id}"><i class="bi bi-hash"></i>${c.name}</a><button class="btn btn-secondary btn-sm py-0 px-2 me-2" title="Share Circle" data-action="share-circle" data-circle-id="${c._id}"><i class="bi bi-share"></i></button></div>`).join('');
        dom.myCirclesContainer.innerHTML = html || `<div class="empty-placeholder small">No circles yet.</div>`;
        document.getElementById('circleSelect').innerHTML = circles.map(c => `<option value="${c._id}">${c.name}</option>`).join('');
    }

    function resetAndRenderDashboardFeed() { state.dashboardFeed.skip = 0; state.dashboardFeed.hasMore = true; dom.feedContainer.innerHTML = ''; renderDashboardFeed(); }
    async function renderDashboardFeed() {
        if (!state.dashboardFeed.hasMore || state.dashboardFeed.isLoading) return;
        state.dashboardFeed.isLoading = true;
        dom.feedLoader.classList.remove('hidden');
        const { filter, skip, limit } = state.dashboardFeed;
        let url = `/feed?skip=${skip}&limit=${limit}`;
        if (typeof filter.circle_id === 'string' && filter.circle_id) { url += `&circle_id=${filter.circle_id}`; }
        try {
            const feedData = await apiFetch(url);
            appendPosts(feedData.posts, dom.feedContainer);
            state.dashboardFeed.hasMore = feedData.has_more;
            state.dashboardFeed.skip += feedData.posts.length;
            if (dom.feedContainer.innerHTML === '' && !feedData.has_more) { dom.feedContainer.innerHTML = `<div class="empty-placeholder">Your feed is empty. Post something!</div>`; }
        } catch (error) { dom.feedContainer.innerHTML = `<div class="empty-placeholder text-danger">Could not load feed.</div>`; } 
        finally { state.dashboardFeed.isLoading = false; dom.feedLoader.classList.add('hidden'); }
    }

    function resetAndRenderCircleFeed() { state.circleView.skip = 0; state.circleView.hasMore = true; dom.circleFeedContainer.innerHTML = ''; dom.circleHeader.innerHTML = ''; renderCircleFeed(); }
    async function renderCircleFeed() {
        const feedState = state.circleView;
        if (!feedState.hasMore || feedState.isLoading) return;
        feedState.isLoading = true;
        dom.feedLoader.classList.remove('hidden');
        try {
            if (feedState.skip === 0) {
                const circleDetails = await apiFetch(`/circles/${feedState.currentCircle._id}`);
                feedState.currentCircle = circleDetails; 
                dom.circleHeader.innerHTML = `<div class="d-flex justify-content-between align-items-center"><div><h2><i class="bi bi-hash"></i> ${circleDetails.name}</h2><p class="text-muted mb-0">${circleDetails.description || 'A shared space for posts.'}</p></div><a href="#" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back to My Feed</a></div>`;
            }
            const url = `/circles/${feedState.currentCircle._id}/feed?skip=${feedState.skip}&limit=${feedState.limit}`;
            const feedData = await apiFetch(url);
            appendPosts(feedData.posts, dom.circleFeedContainer);
            feedState.hasMore = feedData.has_more;
            feedState.skip += feedData.posts.length;
            if (dom.circleFeedContainer.innerHTML === '' && !feedData.has_more) { dom.circleFeedContainer.innerHTML = `<div class="empty-placeholder">This circle has no posts yet.</div>`; }
        } catch (error) { dom.circleFeedContainer.innerHTML = `<div class="empty-placeholder text-danger">Could not load this circle's feed. It may be private or you may need to log in.</div>`; dom.circleHeader.innerHTML = ''; }
        finally { feedState.isLoading = false; dom.feedLoader.classList.add('hidden'); }
    }

    function appendPosts(posts, container) {
        const canDelete = (post) => state.currentUser && post.author_username === state.currentUser.username;
        const postsHtml = posts.map(post => {
            let contentHtml = '';
            switch(post.post_type) {
                case 'wishlist_item': contentHtml = `<h5 class="card-title"><a href="${post.content.url}" target="_blank" rel="noopener noreferrer">${post.content.item_name} <i class="bi bi-box-arrow-up-right"></i></a></h5><p class="card-text text-muted">${post.content.notes || ''}</p>`; break;
                case 'youtube_video': const videoId = getYouTubeID(post.content.youtube_url); contentHtml = `<h5 class="card-title">${post.content.title}</h5>${videoId ? `<div class="video-container my-2"><iframe src="https://www.youtube.com/embed/${videoId}" title="${post.content.title}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>` : ''}<p class="card-text text-muted">${post.content.notes || ''}</p>`; break;
                default: contentHtml = `<p class="card-text" style="white-space: pre-wrap;">${post.content.text}</p>`;
            }
            // ## --- CHANGE START --- ##
            const voteControls = `
                <div class="vote-controls">
                    <button class="vote-btn up ${post.user_vote === 1 ? 'voted' : ''}" data-action="vote" data-post-id="${post._id}" data-direction="1" title="Upvote"><i class="bi bi-arrow-up-circle"></i></button>
                    <span class="vote-score" title="Post score">${post.score}</span>
                    <button class="vote-btn down ${post.user_vote === -1 ? 'voted' : ''}" data-action="vote" data-post-id="${post._id}" data-direction="-1" title="Downvote"><i class="bi bi-arrow-down-circle"></i></button>
                </div>`;
            return `
            <div class="post-card-wrapper" data-post-wrapper-id="${post._id}">
                <div class="glass-card post-card d-flex">
                    ${voteControls}
                    <div class="post-card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="d-flex align-items-center">
                                <div class="avatar me-3 d-flex align-items-center justify-content-center"><i class="bi bi-person-circle"></i></div>
                                <div><strong class="d-block">${post.author_username}</strong><small class="text-muted">in <span class="fw-bold">${post.circle_name}</span> &bull; ${new Date(post.created_at).toLocaleString()}</small></div>
                            </div>
                            <div>
                                <span class="badge bg-primary rounded-pill">${post.post_type.replace(/_/g, ' ')}</span>
                                ${canDelete(post) ? `<button class="btn btn-danger btn-sm ms-2 py-0 px-2" data-action="delete-post" data-post-id="${post._id}" data-circle-id="${post.circle_id}"><i class="bi bi-trash"></i></button>` : ''}
                            </div>
                        </div>
                        <div class="mt-3">${contentHtml}</div>
                    </div>
                </div>
            </div>`;
            // ## --- CHANGE END --- ##
        }).join('');
        container.insertAdjacentHTML('beforeend', postsHtml);
    }
    
    const observer = new IntersectionObserver((entries) => { if (entries[0].isIntersecting) { if (!dom.circleView.classList.contains('hidden')) { renderCircleFeed(); } else if (!dom.dashboardView.classList.contains('hidden')) { renderDashboardFeed(); } } }, { rootMargin: '200px' });
    observer.observe(dom.feedLoader);

    function renderPostContentFields() { const type = dom.postTypeSelect.value; let html = ''; switch(type) { case 'wishlist_item': html = `<input type="text" name="item_name" class="form-control mb-2" placeholder="Item Name" required><input type="url" name="url" class="form-control mb-2" placeholder="Item URL" required><textarea name="notes" class="form-control" placeholder="Notes (optional)"></textarea>`; break; case 'youtube_video': html = `<input type="text" name="title" class="form-control mb-2" placeholder="Video Title" required><input type="url" name="youtube_url" class="form-control mb-2" placeholder="YouTube URL" required><textarea name="notes" class="form-control" placeholder="Notes (optional)"></textarea>`; break; default: html = `<textarea name="text" class="form-control" placeholder="What's on your mind?" required></textarea>`; } dom.postContentFields.innerHTML = html; }
    async function handleAuthAction(e, action) { const btn = e.currentTarget; const u = document.getElementById('usernameInput').value, p = document.getElementById('passwordInput').value; if (!u || !p) return showStatus('Username and password are required', 'warning'); setButtonLoading(btn, true); try { if (await action(u, p)) bootstrap.Modal.getInstance('#authModal').hide(); } catch (error) {} finally { setButtonLoading(btn, false); } }
    async function handleCreateCircle() { const btn = document.getElementById('submitCircleButton'); const name = document.getElementById('circleName').value; const description = document.getElementById('circleDescription').value; const is_public = document.getElementById('isPublicSwitch').checked; setButtonLoading(btn, true); try { await apiFetch('/circles', { method: 'POST', body: JSON.stringify({ name, description, is_public }) }); showStatus('Circle created!', 'success'); bootstrap.Modal.getInstance('#createCircleModal').hide(); document.getElementById('createCircleForm').reset(); const myCircles = await apiFetch('/circles/mine'); state.myCircles = myCircles; renderMyCircles(myCircles); } catch(error) {} finally { setButtonLoading(btn, false); } }
    async function handleCreatePost() { const btn = document.getElementById('submitPostButton'); const circle_id = document.getElementById('circleSelect').value; if (!circle_id) return showStatus('You must select a circle to post in.', 'warning'); const post_type = dom.postTypeSelect.value; const content = {}; dom.postContentFields.querySelectorAll('[name]').forEach(input => { if (input.value) content[input.name] = input.value; }); setButtonLoading(btn, true); try { await apiFetch(`/circles/${circle_id}/posts`, { method: 'POST', body: JSON.stringify({ post_type, content }) }); showStatus('Post created!', 'success'); bootstrap.Modal.getInstance('#createPostModal').hide(); document.getElementById('createPostForm').reset(); renderPostContentFields(); if (state.circleView.currentCircle?._id === circle_id) { resetAndRenderCircleFeed(); } else if (!state.circleView.currentCircle) { resetAndRenderDashboardFeed(); } } catch(error) {} finally { setButtonLoading(btn, false); } }
    async function handleToggleFollow(username) {
        if (!state.currentUser) return showStatus('Please log in to follow users.', 'warning');
        const isFollowing = state.currentUser.following.some(u => u.username === username);
        try {
            await apiFetch(`/users/${username}/follow`, { method: isFollowing ? 'DELETE' : 'POST' });
            showStatus(`Successfully ${isFollowing ? 'unfollowed' : 'followed'} ${username}!`, 'success');
            await fetchCurrentUser();
            renderProfile();
            renderFollowingList();
            renderUserSuggestions();
            const currentSearch = document.getElementById('userSearchInput').value.trim();
            if (currentSearch.toLowerCase() === username.toLowerCase()) {
                const users = await apiFetch(`/users/search?username=${encodeURIComponent(username)}`);
                renderUserList(users, dom.usersContainer, "No user found with that name.");
            }
        } catch(error) {}
    }
    async function handleDeletePost(postId, circleId) { if (!confirm('Are you sure you want to delete this post?')) return; try { await apiFetch(`/circles/${circleId}/posts/${postId}`, { method: 'DELETE' }); showStatus('Post deleted.', 'success'); if (state.circleView.currentCircle) resetAndRenderCircleFeed(); else resetAndRenderDashboardFeed(); } catch(error) {} }
    async function handleUserSearch() { const btn = document.getElementById('userSearchBtn'); const query = document.getElementById('userSearchInput').value.trim(); if (!query) return; setButtonLoading(btn, true); dom.usersContainer.innerHTML = ''; try { const users = await apiFetch(`/users/search?username=${encodeURIComponent(query)}`); renderUserList(users, dom.usersContainer, "No user found with that name."); } catch (error) { console.error("User search failed", error); dom.usersContainer.innerHTML = '<p class="text-danger small text-center">Search failed.</p>'; } finally { setButtonLoading(btn, false); } }
    // ## --- CHANGE START --- ##
    async function handleVote(postId, direction) {
        if (!state.currentUser) return showStatus('Please log in to vote.', 'warning');
        
        const postWrapper = document.querySelector(`[data-post-wrapper-id="${postId}"]`);
        if (!postWrapper) return;

        const upBtn = postWrapper.querySelector('.vote-btn.up');
        const downBtn = postWrapper.querySelector('.vote-btn.down');
        const scoreEl = postWrapper.querySelector('.vote-score');

        const currentVote = upBtn.classList.contains('voted') ? 1 : (downBtn.classList.contains('voted') ? -1 : 0);
        const finalDirection = currentVote === direction ? 0 : direction; // If clicking the same button, clear vote

        try {
            const result = await apiFetch(`/posts/${postId}/vote`, {
                method: 'POST',
                body: JSON.stringify({ direction: finalDirection }),
            });

            // Update UI based on the final direction
            upBtn.classList.toggle('voted', finalDirection === 1);
            downBtn.classList.toggle('voted', finalDirection === -1);
            scoreEl.textContent = result.new_score;
        } catch (error) {
            console.error("Voting failed", error);
        }
    }
    // ## --- CHANGE END --- ##

    document.addEventListener('DOMContentLoaded', () => {
        const authModal = new bootstrap.Modal('#authModal');
        const postModal = new bootstrap.Modal('#createPostModal');
        const circleModal = new bootstrap.Modal('#createCircleModal');
        document.getElementById('loginButton').addEventListener('click', () => authModal.show());
        document.getElementById('loginModalButton').addEventListener('click', e => handleAuthAction(e, login));
        document.getElementById('registerModalButton').addEventListener('click', e => handleAuthAction(e, register));
        document.getElementById('logoutButton').addEventListener('click', logout);
        document.getElementById('createCircleBtn').addEventListener('click', () => circleModal.show());
        document.getElementById('submitCircleButton').addEventListener('click', handleCreateCircle);
        document.getElementById('createPostBtn').addEventListener('click', () => postModal.show());
        document.getElementById('submitPostButton').addEventListener('click', handleCreatePost);
        dom.postTypeSelect.addEventListener('change', renderPostContentFields);
        document.getElementById('userSearchBtn').addEventListener('click', handleUserSearch);
        document.getElementById('userSearchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleUserSearch(); });

        document.body.addEventListener('click', e => {
            const link = e.target.closest('a');
            if (link && link.getAttribute('href') === '#') { e.preventDefault(); window.location.hash = ''; }
            const target = e.target.closest('[data-action]');
            if (!target) return;
            const { action } = target.dataset;
            // ## --- CHANGE START --- ##
            if (action === 'vote') { handleVote(target.dataset.postId, parseInt(target.dataset.direction)); }
            // ## --- CHANGE END --- ##
            if (action === 'toggle-follow') { handleToggleFollow(target.dataset.username); }
            if (action === 'delete-post') { handleDeletePost(target.dataset.postId, target.dataset.circleId); }
            if (action === 'filter-feed') { state.dashboardFeed.filter.circle_id = target.dataset.circleId || null; renderMyCircles(state.myCircles); resetAndRenderDashboardFeed(); }
            if (action === 'share-circle') { const { circleId } = target.dataset; const url = `${window.location.origin}${window.location.pathname}#/circle/${circleId}`; navigator.clipboard.writeText(url).then(() => showStatus('Share link copied to clipboard!', 'success')); }
        });
        window.addEventListener('hashchange', handleRoute);
        renderPostContentFields();
        handleRoute();
    });
  </script>
</body>
</html>
