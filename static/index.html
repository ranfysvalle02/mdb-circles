<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>myCircle ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --primary-glow: rgba(0, 220, 255, 0.5);
      --secondary-glow: rgba(162, 123, 255, 0.5);
      --border-color: rgba(162, 123, 255, 0.3);
      --background-color: #0a041f;
      --card-background: rgba(26, 19, 52, 0.4);
      --text-color: #e0e0e0;
      --text-muted-color: #a0a0b0;
      --timeline-color: rgba(162, 123, 255, 0.4);
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes move-twink-back { from { background-position: 0 0; } to { background-position: -10000px 5000px; } }
    body { font-family: 'Exo 2', sans-serif; color: var(--text-color); background-color: var(--background-color); min-height: 100vh; margin: 0; padding-top: 1rem; padding-bottom: 1rem; overflow-x: hidden; }
    .stars, .twinkling { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; display: block; z-index: -2; }
    .stars { background: #000 url(https://www.script-tutorials.com/demos/360/images/stars.png) repeat top center; }
    .twinkling { background: transparent url(https://www.script-tutorials.com/demos/360/images/twinkling.png) repeat top center; animation: move-twink-back 200s linear infinite; }
    .container { max-width: 1100px; }
    h1, h2, h3, h4 { font-family: 'Orbitron', sans-serif; color: #fff; }
    h1 { text-shadow: 0 0 15px var(--primary-glow); }
    h3 { border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1rem; }
    .glass-card { background: var(--card-background); border-radius: 15px; padding: 25px; border: 1px solid var(--border-color); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 8px 32px 0 rgba(10, 4, 31, 0.37); margin-bottom: 25px; animation: fadeIn 0.6s ease-out forwards; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .glass-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px 0 rgba(10, 4, 31, 0.5); }
    @media (min-width: 992px) {
        #sidebar { position: sticky; top: 1.5rem; height: calc(100vh - 3rem); overflow-y: auto; }
        #sidebar::-webkit-scrollbar { width: 5px; }
        #sidebar::-webkit-scrollbar-track { background: transparent; }
        #sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    }
    .feed-timeline { border-left: 2px solid var(--timeline-color); padding-left: 25px; }
    .post-card { position: relative; }
    .post-card::before {
        content: '';
        position: absolute;
        left: -35px;
        top: 25px;
        height: 18px;
        width: 18px;
        background-color: var(--secondary-glow);
        border: 3px solid var(--text-color);
        border-radius: 50%;
        z-index: 1;
    }
    .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border-color); background-color: rgba(255,255,255,0.1); }
    .avatar-lg { width: 60px; height: 60px; }
    .avatar-sm { width: 30px; height: 30px; }
    .btn { font-family: 'Orbitron', sans-serif; font-weight: 600; border-radius: 8px; border: none; padding: 10px 15px; transition: all 0.3s ease; background-size: 200% 100%; color: white; letter-spacing: 1px; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-primary { background-image: linear-gradient(to right, #6a11cb 0%, #2575fc 51%, #6a11cb 100%); }
    .btn-success { background-image: linear-gradient(to right, #11cb6a 0%, #259cfc 51%, #11cb6a 100%); }
    .btn-secondary { background-image: linear-gradient(to right, #434343 0%, #000000 51%, #434343 100%); }
    .btn-danger { background-image: linear-gradient(to right, #cb1111 0%, #fc2575 51%, #cb1111 100%); }
    .btn:hover { background-position: right center; transform: translateY(-2px) scale(1.05); box-shadow: 0 0 15px var(--secondary-glow); color: #fff; }
    .form-control, .form-select { background-color: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color); color: #fff; border-radius: 8px; }
    .form-control::placeholder { color: #aaa; }
    .form-control:focus, .form-select:focus { background-color: rgba(0, 0, 0, 0.4); color: #fff; box-shadow: 0 0 10px var(--secondary-glow); border-color: #a27bff; }
    .list-group-item { background-color: transparent; border-color: var(--border-color); color: var(--text-color); }
    .list-group-item.clickable { cursor: pointer; transition: background-color 0.2s ease, transform 0.2s ease; }
    .list-group-item.clickable:hover, .list-group-item.active { background-color: rgba(255,255,255,0.1); transform: translateX(5px); }
    .modal-content { background: rgba(16, 8, 47, 0.8); border-radius: 15px; border: 1px solid var(--border-color); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
    .modal-header, .modal-footer { border-color: var(--border-color); }
    .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }
    .hidden { display: none !important; }
    #globalStatus { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1056; }
    .empty-placeholder { color: var(--text-muted-color); text-align: center; padding: 2rem; }
    .post-card .badge { text-transform: capitalize; }
    .post-card .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; background: #000; border-radius: 8px; }
    .post-card .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #feed-loader { text-align: center; padding: 1.5rem; }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="twinkling"></div>

  <div class="container">
    <h1 class="text-center my-4">myCircle ✨</h1>

    <div id="authSection" class="glass-card text-center">
      <h2>Welcome</h2>
      <p class="text-muted">Please log in or register to connect with others.</p>
      <button id="loginButton" class="btn btn-primary"><i class="bi bi-box-arrow-in-right"></i> Login / Register</button>
    </div>

    <div id="appSection" class="hidden">
      <div id="appHeader" class="glass-card d-flex justify-content-between align-items-center mb-4">
        <h2 id="welcomeMessage" class="mb-0 fs-4"></h2>
        <div>
            <button id="createPostBtn" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> New Post</button>
            <button id="createCircleBtn" class="btn btn-success btn-sm"><i class="bi bi-plus-circle"></i> New Circle</button>
            <button id="logoutButton" class="btn btn-secondary btn-sm"><i class="bi bi-box-arrow-left"></i> Logout</button>
        </div>
      </div>

      <div id="dashboardView">
        <div class="row">
          <div class="col-12 col-lg-4">
              <div id="sidebar">
                  <div class="glass-card">
                    <h3><i class="bi bi-person-circle"></i> My Profile</h3>
                    <div id="profileContainer"></div>
                  </div>
                  <div class="glass-card">
                      <h3><i class="bi bi-grid-3x3-gap"></i> My Circles</h3>
                      <p class="text-muted small">Click a circle to filter your feed.</p>
                      <div id="myCirclesContainer" class="list-group"></div>
                  </div>
                  <div class="glass-card">
                      <h3><i class="bi bi-people"></i> Find Users</h3>
                      <div id="usersContainer" class="list-group list-group-flush" style="max-height: 250px; overflow-y: auto;"></div>
                  </div>
              </div>
          </div>
          <div class="col-12 col-lg-8">
            <div id="feedContainer" class="feed-timeline">
              </div>
            <div id="feed-loader" class="hidden">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div id="globalStatus"></div>

  <div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Login or Register</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="text" id="usernameInput" class="form-control mb-3" placeholder="Username (e.g., alice)">
            <input type="password" id="passwordInput" class="form-control" placeholder="Password (e.g., password123)">
        </div>
        <div class="modal-footer">
          <button id="loginModalButton" class="btn btn-primary">Login</button>
          <button id="registerModalButton" class="btn btn-success">Register</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="modal fade" id="createCircleModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
          <div class="modal-header"><h5 class="modal-title">Create New Circle</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">
              <form id="createCircleForm">
                  <div class="mb-3"><input type="text" id="circleName" class="form-control" placeholder="Circle Name" required></div>
                  <div class="mb-3"><textarea id="circleDescription" class="form-control" placeholder="Description (Optional)"></textarea></div>
                  <div class="form-check form-switch mb-3">
                      <input class="form-check-input" type="checkbox" role="switch" id="isPublicSwitch" checked>
                      <label class="form-check-label" for="isPublicSwitch">Public Circle</label>
                  </div>
              </form>
          </div>
          <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button id="submitCircleButton" type="button" class="btn btn-success"><i class="bi bi-check-lg"></i> Create Circle</button>
          </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="createPostModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Create New Post</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="createPostForm">
            <div class="mb-3">
              <label for="circleSelect" class="form-label">Share to Circle</label>
              <select id="circleSelect" class="form-select"></select>
            </div>
            <div class="mb-3">
              <label for="postTypeSelect" class="form-label">Post Type</label>
              <select id="postTypeSelect" class="form-select">
                  <option value="text_update">Text Update</option>
                  <option value="wishlist_item">Wishlist Item (Amazon, etc.)</option>
                  <option value="youtube_video">YouTube Video</option>
              </select>
            </div>
            <div id="postContentFields"></div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button id="submitPostButton" type="button" class="btn btn-primary"><i class="bi bi-send"></i> Submit Post</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const BASE_URL = ''; 
    const state = {
        accessToken: null,
        currentUser: null,
        myCircles: [],
        feed: {
            filter: { circle_id: null },
            skip: 0,
            limit: 10,
            hasMore: true,
            isLoading: false,
        }
    };

    const dom = {
        authSection: document.getElementById('authSection'),
        appSection: document.getElementById('appSection'),
        welcomeMessage: document.getElementById('welcomeMessage'),
        profileContainer: document.getElementById('profileContainer'),
        usersContainer: document.getElementById('usersContainer'),
        myCirclesContainer: document.getElementById('myCirclesContainer'),
        feedContainer: document.getElementById('feedContainer'),
        feedLoader: document.getElementById('feed-loader'),
        postTypeSelect: document.getElementById('postTypeSelect'),
        postContentFields: document.getElementById('postContentFields'),
    };
    
    // --- UTILITY & UI HELPERS ---
    const setButtonLoading = (btn, isLoading) => { if(btn) { btn.disabled = isLoading; if(isLoading) { btn.dataset.html = btn.innerHTML; btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span>`; } else { btn.innerHTML = btn.dataset.html; } } };
    const showStatus = (msg, type = 'success') => { const id = `a${Date.now()}`; document.getElementById('globalStatus').innerHTML = `<div id="${id}" class="alert alert-${type} alert-dismissible fade show"> ${msg} <button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`; setTimeout(() => bootstrap.Alert.getOrCreateInstance(`#${id}`)?.close(), 4000); };
    const getYouTubeID = url => { const arr = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/); return (arr && arr[1]) ? arr[1] : null; };

    // --- API & AUTH ---
    async function apiFetch(endpoint, options = {}) {
        options.headers = { ...options.headers, 'Content-Type': 'application/json' };
        if (state.accessToken) options.headers['Authorization'] = `Bearer ${state.accessToken}`;

        const response = await fetch(`${BASE_URL}${endpoint}`, options);
        if (!response.ok) {
            const err = await response.json().catch(() => ({ detail: `Error: ${response.status}` }));
            showStatus(err.detail || 'An unknown error occurred.', 'danger');
            throw new Error(err.detail);
        }
        return response.status === 204 ? null : response.json();
    }

    const storeTokens = (access) => { state.accessToken = access; localStorage.setItem('accessToken', access); };
    const logout = () => { state.accessToken = null; state.currentUser = null; localStorage.clear(); renderUI(); };
    const login = async (username, password) => { const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) }); storeTokens(data.access_token); await fetchCurrentUser(); renderUI(); showStatus('Login successful!', 'success'); return true; };
    const register = async (username, password) => { await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ username, password }) }); showStatus('Registration successful! Please log in.', 'success'); return true; };
    
    async function fetchCurrentUser() {
        if (!state.accessToken) return;
        try { state.currentUser = await apiFetch('/users/me'); } 
        catch (error) { console.error("Token might be expired, logging out.", error); logout(); }
    }

    // --- RENDERING LOGIC ---
    function renderUI() {
        const loggedIn = !!state.currentUser;
        dom.authSection.classList.toggle('hidden', loggedIn);
        dom.appSection.classList.toggle('hidden', !loggedIn);
        if (loggedIn) {
            dom.welcomeMessage.textContent = `Welcome, ${state.currentUser.username}!`;
            renderDashboard();
        }
    }

    async function renderDashboard() {
        renderProfile();
        try {
            const [users, myCircles] = await Promise.all([apiFetch('/users'), apiFetch('/circles/mine')]);
            state.myCircles = myCircles;
            renderUsers(users);
            renderMyCircles(myCircles);
            resetAndRenderFeed();
        } catch (error) { console.error("Failed to load dashboard data", error); }
    }
    
    function renderProfile() {
        if (!state.currentUser) return;
        dom.profileContainer.innerHTML = `
            <div class="d-flex align-items-center">
                <div class="avatar avatar-lg me-3 d-flex align-items-center justify-content-center fs-2"><i class="bi bi-person-circle"></i></div>
                <div>
                    <h4 class="mb-0">${state.currentUser.username}</h4>
                    <p class="mb-1"><strong>Following:</strong> ${state.currentUser.following_count}</p>
                    <p class="mb-0"><strong>Followers:</strong> ${state.currentUser.followers_count}</p>
                </div>
            </div>
        `;
    }

    function renderUsers(users) {
        const fIds = state.currentUser.following.map(u => u.id);
        dom.usersContainer.innerHTML = users.map(user => {
            if (user.username === state.currentUser.username) return '';
            return `
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <div class="avatar avatar-sm me-2 d-flex align-items-center justify-content-center"><i class="bi bi-person-circle"></i></div>
                    <span>${user.username}</span>
                </div>
                <button class="btn btn-sm ${fIds.includes(user.id) ? 'btn-danger' : 'btn-primary'}" data-action="toggle-follow" data-username="${user.username}">${fIds.includes(user.id) ? 'Unfollow' : 'Follow'}</button>
            </div>`;
        }).join('');
    }

    function renderMyCircles(circles) {
        const { circle_id } = state.feed.filter;
        let html = `<a href="#" class="list-group-item clickable list-group-item-action ${!circle_id ? 'active' : ''}" data-action="filter-feed" data-circle-id=""><i class="bi bi-collection-fill me-2"></i>All My Circles</a>`;
        html += circles.map(c => `<a href="#" class="list-group-item clickable list-group-item-action ${circle_id === c._id ? 'active' : ''}" data-action="filter-feed" data-circle-id="${c._id}"><i class="bi bi-hash"></i>${c.name}</a>`).join('');
        dom.myCirclesContainer.innerHTML = html || `<div class="empty-placeholder small">No circles yet.</div>`;
        document.getElementById('circleSelect').innerHTML = circles.map(c => `<option value="${c._id}">${c.name}</option>`).join('');
    }

    // --- FEED & LAZY LOADING LOGIC ---
    function resetAndRenderFeed() {
        state.feed.skip = 0;
        state.feed.hasMore = true;
        dom.feedContainer.innerHTML = '';
        dom.feedLoader.classList.add('hidden');
        renderFeed();
    }

    async function renderFeed() {
        if (!state.feed.hasMore || state.feed.isLoading) return;

        state.feed.isLoading = true;
        dom.feedLoader.classList.remove('hidden');

        const { filter, skip, limit } = state.feed;
        let url = `/feed?skip=${skip}&limit=${limit}`;
        
        if (typeof filter.circle_id === 'string' && filter.circle_id) {
            url += `&circle_id=${filter.circle_id}`;
        }

        try {
            const feedData = await apiFetch(url);
            appendPosts(feedData.posts);

            state.feed.hasMore = feedData.has_more;
            state.feed.skip += feedData.posts.length;

            if (dom.feedContainer.innerHTML === '' && !feedData.has_more) {
                dom.feedContainer.innerHTML = `<div class="empty-placeholder">Your feed is empty. Post something!</div>`;
            }
        } catch (error) {
            dom.feedContainer.innerHTML = `<div class="empty-placeholder text-danger">Could not load feed.</div>`;
        } finally {
            state.feed.isLoading = false;
            dom.feedLoader.classList.add('hidden');
        }
    }

    function appendPosts(posts) {
        const postsHtml = posts.map(post => {
            let contentHtml = '';
            switch(post.post_type) {
                case 'wishlist_item':
                    contentHtml = `<h5 class="card-title"><a href="${post.content.url}" target="_blank" rel="noopener noreferrer">${post.content.item_name} <i class="bi bi-box-arrow-up-right"></i></a></h5><p class="card-text text-muted">${post.content.notes || ''}</p>`;
                    break;
                case 'youtube_video':
                    const videoId = getYouTubeID(post.content.youtube_url);
                    contentHtml = `<h5 class="card-title">${post.content.title}</h5>${videoId ? `<div class="video-container my-2"><iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div>` : ''}<p class="card-text text-muted">${post.content.notes || ''}</p>`;
                    break;
                default:
                    contentHtml = `<p class="card-text" style="white-space: pre-wrap;">${post.content.text}</p>`;
            }

            return `
            <div class="glass-card post-card">
              <div class="d-flex justify-content-between align-items-start">
                <div class="d-flex align-items-center">
                  <div class="avatar me-3 d-flex align-items-center justify-content-center"><i class="bi bi-person-circle"></i></div>
                  <div>
                    <strong class="d-block">${post.author_username}</strong>
                    <small class="text-muted">in <span class="fw-bold">${post.circle_name}</span> &bull; ${new Date(post.created_at).toLocaleString()}</small>
                  </div>
                </div>
                <div>
                    <span class="badge bg-primary rounded-pill">${post.post_type.replace(/_/g, ' ')}</span>
                    ${post.author_username === state.currentUser.username ? `<button class="btn btn-danger btn-sm ms-2 py-0 px-2" data-action="delete-post" data-post-id="${post.id}" data-circle-id="${post.circle_id}"><i class="bi bi-trash"></i></button>` : ''}
                </div>
              </div>
              <div class="mt-3">${contentHtml}</div>
            </div>`;
        }).join('');
        dom.feedContainer.insertAdjacentHTML('beforeend', postsHtml);
    }
    
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            renderFeed();
        }
    }, { rootMargin: '200px' });
    observer.observe(dom.feedLoader);

    // --- RENDER FORM FIELDS ---
    function renderPostContentFields() {
        const type = dom.postTypeSelect.value;
        let html = '';
        switch(type) {
            case 'wishlist_item': html = `<input type="text" name="item_name" class="form-control mb-2" placeholder="Item Name" required><input type="url" name="url" class="form-control mb-2" placeholder="Item URL (e.g., Amazon link)" required><textarea name="notes" class="form-control" placeholder="Notes (optional)"></textarea>`; break;
            case 'youtube_video': html = `<input type="text" name="title" class="form-control mb-2" placeholder="Video Title" required><input type="url" name="youtube_url" class="form-control mb-2" placeholder="YouTube URL" required><textarea name="notes" class="form-control" placeholder="Notes (optional)"></textarea>`; break;
            default: html = `<textarea name="text" class="form-control" placeholder="What's on your mind?" required></textarea>`; break;
        }
        dom.postContentFields.innerHTML = html;
    }

    // --- EVENT HANDLERS ---
    async function handleAuthAction(e, action) {
        const btn = e.currentTarget;
        const u = document.getElementById('usernameInput').value, p = document.getElementById('passwordInput').value;
        if (!u || !p) return showStatus('Username and password are required', 'warning');
        setButtonLoading(btn, true);
        try { if (await action(u, p)) bootstrap.Modal.getInstance('#authModal').hide(); } 
        catch (error) {} 
        finally { setButtonLoading(btn, false); }
    }
    
    async function handleCreateCircle() {
        const btn = document.getElementById('submitCircleButton');
        const name = document.getElementById('circleName').value;
        const description = document.getElementById('circleDescription').value;
        const is_public = document.getElementById('isPublicSwitch').checked;
        setButtonLoading(btn, true);
        try {
            await apiFetch('/circles', { method: 'POST', body: JSON.stringify({ name, description, is_public }) });
            showStatus('Circle created!', 'success');
            bootstrap.Modal.getInstance('#createCircleModal').hide();
            document.getElementById('createCircleForm').reset();
            const myCircles = await apiFetch('/circles/mine');
            state.myCircles = myCircles;
            renderMyCircles(myCircles);
        } catch(error) {}
        finally { setButtonLoading(btn, false); }
    }
    
    async function handleCreatePost() {
        const btn = document.getElementById('submitPostButton');
        const circle_id = document.getElementById('circleSelect').value;
        if (!circle_id) return showStatus('You must select a circle to post in.', 'warning');
        const post_type = dom.postTypeSelect.value;
        const content = {};
        dom.postContentFields.querySelectorAll('[name]').forEach(input => { if (input.value) content[input.name] = input.value; });
        setButtonLoading(btn, true);
        try {
            await apiFetch(`/circles/${circle_id}/posts`, { method: 'POST', body: JSON.stringify({ post_type, content }) });
            showStatus('Post created!', 'success');
            bootstrap.Modal.getInstance('#createPostModal').hide();
            resetAndRenderFeed();
        } catch(error) {}
        finally { setButtonLoading(btn, false); }
    }
    
    async function handleToggleFollow(username) {
        const isFollowing = state.currentUser.following.some(u => u.username === username);
        try {
            await apiFetch(`/users/${username}/follow`, { method: isFollowing ? 'DELETE' : 'POST' });
            showStatus(`Successfully ${isFollowing ? 'unfollowed' : 'followed'} ${username}!`, 'success');
            await fetchCurrentUser();
            renderProfile();
            const users = await apiFetch('/users');
            renderUsers(users);
        } catch(error) {}
    }
    
    async function handleDeletePost(postId, circleId) {
        if (!confirm('Are you sure you want to delete this post?')) return;
        try {
            await apiFetch(`/circles/${circleId}/posts/${postId}`, { method: 'DELETE' });
            showStatus('Post deleted.', 'success');
            resetAndRenderFeed();
        } catch(error) {}
    }

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
        const authModal = new bootstrap.Modal('#authModal');
        const postModal = new bootstrap.Modal('#createPostModal');
        const circleModal = new bootstrap.Modal('#createCircleModal');

        document.getElementById('loginButton').addEventListener('click', () => authModal.show());
        document.getElementById('loginModalButton').addEventListener('click', e => handleAuthAction(e, login));
        document.getElementById('registerModalButton').addEventListener('click', e => handleAuthAction(e, register));
        document.getElementById('logoutButton').addEventListener('click', logout);
        document.getElementById('createCircleBtn').addEventListener('click', () => circleModal.show());
        document.getElementById('submitCircleButton').addEventListener('click', handleCreateCircle);
        document.getElementById('createPostBtn').addEventListener('click', () => postModal.show());
        document.getElementById('submitPostButton').addEventListener('click', handleCreatePost);
        dom.postTypeSelect.addEventListener('change', renderPostContentFields);

        document.body.addEventListener('click', e => {
            const target = e.target.closest('[data-action]');
            if (!target) return;
            
            const { action } = target.dataset;
            e.preventDefault();

            if (action === 'toggle-follow') {
                const { username } = target.dataset;
                handleToggleFollow(username);
            }
            
            if (action === 'delete-post') {
                const { postId, circleId } = target.dataset;
                handleDeletePost(postId, circleId);
            }

            if (action === 'filter-feed') {
                const { circleId } = target.dataset;
                state.feed.filter.circle_id = circleId || null;
                renderMyCircles(state.myCircles);
                resetAndRenderFeed();
            }
        });

        (async () => {
            state.accessToken = localStorage.getItem('accessToken');
            if (state.accessToken) await fetchCurrentUser();
            renderUI();
            renderPostContentFields();
        })();
    });
  </script>
</body>
</html>
